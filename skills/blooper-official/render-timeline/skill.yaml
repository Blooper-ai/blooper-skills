slug: blooper-official/render-timeline
version: 2.0.0
name: Render timeline
description: >
  Render a Timeline to a single MP4 file via ffmpeg. Each call produces a new
  READY FileVersion on the Timeline's backing file.
publisher: blooper
kind: skill

license: Apache-2.0
applies_to:
  folder_kind: ["timeline"]

runtime: deterministic
deterministic:
  tool: render_timeline

tools:
  - render_timeline

params:
  - name: timeline_folder_id
    label: Timeline folder
    type: text
    # Pre-filled from the surrounding folder context — applies_to.folder_kind
    # = timeline already pins it. The BE fills this server-side.
    optional: true
    prefill_from: context.current_folder_id
    placeholder: uuid
  - name: aspect
    label: Output preset
    type: select
    options:
      - "720p"
      - "1080p"
      - "4k"
      - "720p_vertical"
      - "1080p_vertical"
      - "4k_vertical"
      - "square_1080p"
    optional: false

output:
  produces: file_versions
  count: 1

permissions:
  install: any_project_member
  run: any_project_member

budget:
  # Deterministic runtime: only render_timeline is billed (cost 5).
  max_provider_calls: 5
  max_minutes: 20
  max_sub_runs: 0

prompt: |
  Deterministic skill — calls render_timeline with the supplied params. No LLM is invoked at run-time; this prompt is only kept for the marketplace UI.
