slug: blooper-official/generate-room-from-refs
version: 1.3.0
name: Generate Room from References
description: Generate consistent room images from reference photos in this folder.
publisher: blooper
kind: skill
license: Apache-2.0

applies_to:
  file_type: ["IMAGE"]
  # tags-replace-folders: target the seeded Locations tag by its stable
  # behavior key (rename-proof), not by display name.
  tag_slug: ["locations"]
  min_context_files: 1

tools:
  - get_run_context
  - generate_image
  - list_folder_files
  - read_file_version

params:
  - name: room_count
    label: Number of rooms
    type: integer
    min: 1
    max: 8
    default: 4
  - name: style
    label: Style direction
    type: text
    optional: true
  - name: references
    label: Reference images
    type: file_versions
    source: current_folder
    file_type: IMAGE
    min: 1

output:
  produces: file_versions
  count: from_param.room_count
  parent_kind: folder
  parent_from: context.current_folder

permissions:
  install: any_project_member
  run: any_project_member

budget:
  max_provider_calls: 12
  max_minutes: 8
  max_sub_runs: 0

prompt: |
  You are generating {{room_count}} room images that stay visually consistent
  with the user's reference photos already in this Locations tag.

  Step 1: call get_run_context to learn project_id and current_folder (the
    Locations tag we are writing into).

  Step 2: build the reference set. If the user picked references in the
    Configure form, use exactly those version ids: {{references}}. Otherwise
    call list_folder_files on the current folder and collect every file
    whose type=IMAGE and current_version_id is not null. Those version ids
    become ref_version_ids — the visual reference set every room must match.
      HARD RULE: at least one reference image must be present. If the
      folder has no IMAGE files with a current_version_id, surface a
      one-line error to the user ("The Locations tag has no reference
      images — add one before running this skill.") and stop.

  Step 3: for each of the {{room_count}} rooms, call generate_image with:
      provider=FLUX2_MAX
      ref_version_ids=<the list collected in Step 2>
      folder_id=<the folder_id from Step 1>       # write into this folder
      label="Room <n>"                            # e.g. "Room 1", "Room 2"
      prompt=<the per-room prompt below>

    Per-room prompt: describe ONE distinct interior space (kitchen, living
    room, bedroom, hallway, study — pick whatever makes sense given the
    references), photoreal, single wide establishing shot, no people, no
    text, no captions. Weave the user's style direction "{{style}}" into
    every prompt so all {{room_count}} rooms share that direction. Each
    room must be DIFFERENT — do not regenerate the same space twice.

  Step 4: report a one-line summary per room (n / room_count, new file id,
    short description) so the user can scan the result.

  Hard rules:
    - generate_image with folder_id already creates a new file and a READY
      version in that folder — never try to save results any other way.
    - Do NOT mutate any existing reference file. The references are
      read-only inputs.
    - Do NOT skip the reference list. The whole point is that the new
      rooms share lighting/material/style with the supplied photos.
