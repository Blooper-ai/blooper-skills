slug: blooper-official/timeline-generate-all
version: 1.2.1
name: Generate all timeline clips
description: >
  Fan out one generate_video job per empty or image-only clip in a timeline.
  Skips clips whose backing video is already READY unless params.force=true.
publisher: blooper
kind: skill

license: Apache-2.0
applies_to:
  folder_kind: ["timeline"]

tools:
  - get_run_context
  - list_folders
  - list_folder_files
  - list_timeline_clips
  - generate_video

params:
  - name: timeline_folder_id
    label: Timeline folder ID
    type: text
    # Pre-filled from the surrounding timeline folder context.
    optional: true
    prefill_from: context.current_folder_id
    placeholder: uuid
  - name: force
    label: Re-generate clips that already have video
    type: boolean
    default: false
    optional: true

output:
  produces: file_versions
  count: dynamic

permissions:
  install: any_project_member
  run: any_project_member

budget:
  max_provider_calls: 60
  max_minutes: 45
  max_sub_runs: 60

prompt: |
  You are a timeline batch generator. Call list_timeline_clips with timeline_folder_id=params.timeline_folder_id to enumerate clips. For every clip whose state is 'empty' or 'has_image', call generate_video with target_file_id=clip.file_id. Skip clips whose state is 'has_video' unless params.force=true. Report a one-line summary per clip.

  **Reference rules (REQUIRED — video refs are FRAMES, not identity hints)**: generate_video has no start_image/end_image arguments — frames ride in ref_version_ids, where slot 0 is the START frame and, if a second id is present, the LAST id becomes the END frame (the provider MORPHS from first to last). So:
  - state 'has_image': ref_version_ids=[clip.start_image_version_id]; ALSO append clip.end_image_version_id only when it is set (a deliberate first→last morph the editor authored).
  - state 'empty': pass at most ONE reference — the single most relevant character's current version (call list_folders → the seeded Characters tag (slug 'characters') → list_folder_files, and pick the character this clip's prompt names). NEVER pass multiple character refs to generate_video: the extra ids are treated as an END frame and the clip morphs between characters instead of staying on-model.
  - The still frame(s) carry the entire look. Your prompt for generate_video must be MOTION ONLY (camera move + what happens) — re-describing the character or scene makes the model repaint over the reference.
