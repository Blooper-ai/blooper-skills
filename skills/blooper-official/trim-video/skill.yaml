slug: blooper-official/trim-video
version: 2.0.0
name: Trim video
description: >
  Trim a VIDEO file version to a given [start_sec, end_sec) range. Produces a
  new READY FileVersion.
publisher: blooper
kind: skill

license: Apache-2.0
applies_to:
  file_type: ["VIDEO"]

runtime: deterministic
deterministic:
  tool: trim_video_version

tools:
  - trim_video_version

params:
  - name: file_version_id
    label: Source video version
    type: text
    # Pre-filled from the surrounding file context — same pattern as
    # crop-video; the BE resolves this server-side from
    # body.context.current_version_id.
    optional: true
    prefill_from: context.current_version_id
    placeholder: uuid
  - name: start_sec
    label: Start (seconds)
    type: number
    optional: false
  - name: end_sec
    label: End (seconds)
    type: number
    optional: false

output:
  produces: file_versions
  count: 1

permissions:
  install: any_project_member
  run: any_project_member

budget:
  # Deterministic runtime: only trim_video_version is billed (cost 1).
  max_provider_calls: 1
  max_minutes: 5
  max_sub_runs: 0

prompt: |
  Deterministic skill — calls trim_video_version with the supplied params. No LLM is invoked at run-time; this prompt is only kept for the marketplace UI.
