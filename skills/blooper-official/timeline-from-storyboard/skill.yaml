slug: blooper-official/timeline-from-storyboard
version: 1.1.0
name: Create timeline from storyboard
description: >
  Create a new Timeline structurally seeded from a Storyboard: one
  TimelineScene per SB Scene, one TimelineClip per Shot, with the shot's
  current image as the clip's start image when available. Does not generate
  any video; subsequent generation is up to the user or the
  timeline-generate-all skill.
publisher: blooper
kind: skill

license: Apache-2.0
applies_to:
  folder_kind: ["storyboard"]

tools:
  - get_run_context
  - find_videos_folder
  - create_timeline

params:
  - name: storyboard_folder_id
    label: Storyboard folder ID
    type: text
    # Pre-filled from the surrounding storyboard folder context.
    optional: true
    prefill_from: context.current_folder_id
    placeholder: uuid
  - name: name
    label: Timeline name
    type: text
    default: ""
    optional: true

output:
  produces: metadata_only
  count: 1

permissions:
  install: any_project_member
  run: any_project_member

budget:
  max_provider_calls: 2
  max_minutes: 2
  max_sub_runs: 0

prompt: |
  Call find_videos_folder for the current project, then call create_timeline with parent_folder_id=<videos.id> and seed_storyboard_folder_id=<params.storyboard_folder_id>. Use the supplied params.name if provided, otherwise let the server default to '<storyboard.name> timeline'. Report the new timeline_folder_id.
