slug: blooper-official/crop-video
version: 2.0.0
name: Crop video
description: >
  Crop a VIDEO file version to one of three aspect-ratio presets
  (1:1, 9:16, 16:9) with a centered crop. Produces a new READY FileVersion.
publisher: blooper
kind: skill

license: Apache-2.0
applies_to:
  file_type: ["VIDEO"]

runtime: deterministic
deterministic:
  tool: crop_video_version

tools:
  - crop_video_version

params:
  - name: file_version_id
    label: Source video version
    type: text
    # Pre-filled from the surrounding file context — saves the user from
    # having to paste a UUID into the Configure modal when
    # applies_to.file_type=VIDEO already pins it. The BE resolves this
    # in rest/skills.trigger_run when the caller omits the value.
    optional: true
    prefill_from: context.current_version_id
    placeholder: uuid
  - name: aspect
    label: Aspect ratio
    type: select
    options:
      - "1:1"
      - "9:16"
      - "16:9"
    optional: false

output:
  produces: file_versions
  count: 1

permissions:
  install: any_project_member
  run: any_project_member

budget:
  # Deterministic runtime: only the one tool call is billed. No LLM, no
  # reflection turns, so the budget is just crop_video_version's cost (1)
  # with no headroom needed.
  max_provider_calls: 1
  max_minutes: 5
  max_sub_runs: 0

prompt: |
  Deterministic skill — calls crop_video_version with the supplied params. No LLM is invoked at run-time; this prompt is only kept for the marketplace UI.
