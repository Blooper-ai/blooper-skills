slug: blooper-official/crop-video
version: 1.2.0
name: Crop video
description: >
  Crop a VIDEO file version to one of three aspect-ratio presets
  (1:1, 9:16, 16:9) with a centered crop. Produces a new READY FileVersion.
publisher: blooper
kind: skill

license: Apache-2.0
applies_to:
  file_type: ["VIDEO"]

tools:
  - get_run_context
  - crop_video_version

params:
  - name: file_version_id
    label: Source video version
    type: text
    # Pre-filled from the surrounding file context — saves the user from
    # having to paste a UUID into the Configure modal when
    # applies_to.file_type=VIDEO already pins it. The BE resolves this
    # in rest/skills.trigger_run when the caller omits the value.
    optional: true
    prefill_from: context.current_version_id
    placeholder: uuid
  - name: aspect
    label: Aspect ratio
    type: select
    options:
      - "1:1"
      - "9:16"
      - "16:9"
    optional: false

output:
  produces: file_versions
  count: 1

permissions:
  install: any_project_member
  run: any_project_member

budget:
  # get_run_context (cost 0) + crop_video_version (cost 1) + headroom for
  # one reflection turn. max=1 was forcing every run onto a
  # budget_extension after the LLM's second turn — verified during QA on
  # 2026-06-08.
  max_provider_calls: 3
  max_minutes: 5
  max_sub_runs: 0

prompt: |
  You are a video crop tool. Call crop_video_version with the supplied file_version_id and aspect preset. Report the new_version_id.
