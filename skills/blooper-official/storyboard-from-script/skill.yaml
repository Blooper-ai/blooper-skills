slug: blooper-official/storyboard-from-script
version: 2.0.0
name: Storyboard from script
description: >
  Run the full v2 pipeline (5 LLM stages) on a TEXT script: scene partition →
  director shot list with camera movement + duration + per-shot character
  presence → character detection → dedup with appearance/clothing/role →
  photorealistic image prompts. Persists a storyboard with scenes/shots fully
  populated and creates character placeholders in the Characters folder.
publisher: blooper
kind: skill
license: Apache-2.0
preinstall: true
icon: icon.svg

applies_to: {}

tools:
  - generate_storyboard_from_script

params:
  - name: text_file_version_id
    label: Script (TEXT version)
    type: file_version
    source: project
    optional: false
  - name: storyboard_name
    label: Storyboard name
    type: text
    default: ""
    optional: true
    placeholder: leave blank to derive from the script

output:
  produces: metadata_only
  count: dynamic

permissions:
  install: any_project_member
  run: any_project_member

budget:
  max_provider_calls: 6
  max_minutes: 45
  max_sub_runs: 0

prompt: |
  You are running the v2 script→storyboard pipeline. Call generate_storyboard_from_script EXACTLY ONCE with text_file_version_id set to {{text_file_version_id}} and storyboard_name set to {{storyboard_name}}. That single tool call runs all five LLM stages internally (scene partition, per-scene director shot list with cam_mvmnt + duration + character presence, character detection, character dedup, photorealistic image-prompt generation) and persists the storyboard folder, scene folders, shot files (with cam_mvmnt + duration_sec + per-shot character lists + image prompt), and character placeholders in the Characters folder. After the tool returns, report the storyboard_folder_id + the scenes/shots/characters counts back to the user. Tell the user the next steps in plain English: open the Characters folder, generate an image for each placeholder (the appearance reference is in References → Character — <name>.md if it exists), then run blooper/storyboard-generate-all to fill the empty shot placeholders with images.
