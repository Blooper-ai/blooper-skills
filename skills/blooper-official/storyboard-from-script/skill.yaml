slug: blooper-official/storyboard-from-script
version: 2.2.0
name: Storyboard from script
description: >
  Run the full v2 pipeline (5 LLM stages) on a TEXT script: scene partition →
  director shot list with camera movement + duration + per-shot character
  presence → character detection → dedup with appearance/clothing/role →
  photorealistic image prompts. Persists a storyboard with scenes/shots fully
  populated. Structure only by design: it creates NO character or location
  image files — your existing Characters/Locations assets stay the single
  source of truth and get attached as references when the shots are rendered.
publisher: blooper
kind: skill
license: Apache-2.0
preinstall: true
icon: icon.svg

applies_to:
  file_type:
    - TEXT

tools:
  - generate_storyboard_from_script

params:
  - name: text_file_version_id
    label: Script (TEXT version)
    type: file_version
    source: project
    optional: false
  - name: storyboard_name
    label: Storyboard name
    type: text
    default: ""
    optional: true
    placeholder: leave blank to derive from the script

output:
  produces: metadata_only
  count: dynamic

permissions:
  install: any_project_member
  run: any_project_member

budget:
  # generate_storyboard_from_script has cost=5 in the BE tools registry;
  # the validator's budget lint (scripts/validate.py:_budget_check) flags
  # anything below sum_of_costs + reflection headroom (~2). 8 covers the
  # tool itself, the one reflection turn the LLM takes after the tool
  # returns to write its summary message, and leaves headroom for an
  # edge-case retry without bouncing onto a budget_extension approval.
  max_provider_calls: 8
  max_minutes: 45
  max_sub_runs: 0

prompt: |
  You are running the v2 script→storyboard pipeline. Call generate_storyboard_from_script EXACTLY ONCE with text_file_version_id set to {{text_file_version_id}}, storyboard_name set to {{storyboard_name}}, and structure_only=true. That single tool call runs all five LLM stages internally (scene partition, per-scene director shot list with cam_mvmnt + duration + character presence, character detection, character dedup, photorealistic image-prompt generation) and persists the storyboard folder, scene folders, and shot files (with cam_mvmnt + duration_sec + per-shot character lists + image prompt). structure_only means it deliberately creates NO character or location image files — the user's existing Characters/Locations assets stay the single source of truth, so do NOT tell the user to expect new placeholders anywhere. After the tool returns, report the storyboard_folder_id + the scenes/shots counts back to the user. Tell the user the next steps in plain English: open the storyboard in the Storyboards section to review the plan, make sure each character in the cast has an image in the Characters folder (generate any that are missing), then render the shots from the chat — generate each shot into its card with the character (and location) images attached as references, so every shot shows their exact cast.
