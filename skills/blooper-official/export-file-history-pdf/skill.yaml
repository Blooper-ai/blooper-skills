slug: blooper-official/export-file-history-pdf
version: 1.3.0
name: Export file history (PDF)
description: >
  Export version history as a PDF. On a file: that file's complete history —
  every version from the first to current, with prompt, model, mode, the
  references used, and a thumbnail. On a timeline or storyboard: the aggregate
  history of every clip/shot inside it, one section per file. Turn on "include
  provenance" to also append the recursive cross-file provenance of the current
  version (how each reference was made, and how THEIR references were made). The
  PDF lands in the project's Exports folder, and you get an "export ready"
  notification.
publisher: blooper
kind: skill

license: Apache-2.0
# Anchored on a file → that file's history; anchored on a timeline or
# storyboard → the aggregate history of its clips/shots. file_type and
# folder_kind are alternatives here (the run is on a file OR a folder).
applies_to:
  file_type: ["IMAGE", "VIDEO", "TEXT"]
  folder_kind: ["timeline", "storyboard"]

runtime: deterministic
deterministic:
  tool: export_file_history_pdf

tools:
  - export_file_history_pdf

params:
  - name: file_id
    label: File
    type: text
    # Pre-filled from the surrounding file context — same pattern as
    # trim/crop-video. The tool falls back to the anchored file when omitted.
    optional: true
    prefill_from: context.current_file_id
    placeholder: uuid
  - name: include_provenance
    label: Include how references were made (recursive, full tree)
    type: boolean
    default: true
    optional: true
  - name: max_depth
    # Optional cap. Omit to walk the ENTIRE provenance tree to its leaves
    # (the default) — the cycle/dedupe guard guarantees termination.
    label: "Max provenance depth (default: entire tree)"
    type: integer
    min: 1
    optional: true

output:
  produces: file_versions
  count: 1

permissions:
  install: any_project_member
  run: any_project_member

budget:
  # Deterministic runtime: export_file_history_pdf is cost 0 (pure
  # data + PDF render, no provider calls).
  max_provider_calls: 0
  max_minutes: 15
  max_sub_runs: 0

prompt: |
  Deterministic skill — calls export_file_history_pdf with the supplied params. No LLM is invoked at run-time; this prompt is only kept for the marketplace UI.
