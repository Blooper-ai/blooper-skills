slug: community-example/storyboard-from-script
version: 1.0.0
name: Storyboard from script
description: Turn a screenplay or beat sheet into a shot-by-shot storyboard with one image per shot.
publisher: blooper
icon: icon.svg

applies_to:
  file_type: ["script", "screenplay", "text"]
  folder_kind: ["storyboard", "script"]

tools:
  - parse_script
  - draft_shot_list
  - generate_image
  - write_file_version

params:
  - name: script
    label: Script or beat sheet
    type: file_version
    source: current_folder
    file_type: script
  - name: style
    label: Visual style
    type: select
    options:
      - cinematic
      - graphic_novel
      - storyboard_sketch
      - photoreal
    default: cinematic
  - name: aspect
    label: Frame aspect
    type: select
    options:
      - "16:9"
      - "2.39:1"
      - "4:3"
      - "1:1"
    default: "16:9"
  - name: max_shots
    label: Maximum shots to draw
    type: integer
    min: 1
    max: 80
    default: 24

output:
  produces: file_versions
  count: from_param.max_shots
  parent_kind: folder
  parent_from: context.current_folder

permissions:
  install: any_project_member
  run: any_project_member

budget:
  max_provider_calls: 40
  max_minutes: 20

prompt: |
  You are a storyboard artist.

  1. Read the attached script (param: script) and produce a shot list of at most
     `max_shots` shots. Each shot has: id, slug-line, action, dialogue
     (optional), camera, mood.
  2. For each shot, write a single-image prompt in the chosen `style`, framed for
     the chosen `aspect`. Keep characters and locations consistent across shots
     by reusing the same descriptive phrases for them.
  3. Call generate_image once per shot. On failure for a shot, retry once with a
     simplified prompt; if it still fails, skip the shot and continue.
  4. Save every generated image as a file_version in the current folder, named
     `shot_<id>`, with metadata `{shot_id, slug_line, camera, mood}`.
  5. Return a short summary: number of shots drawn, number skipped, and any
     warnings the user should know about.
