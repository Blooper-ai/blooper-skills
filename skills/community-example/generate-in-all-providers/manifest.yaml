slug: community-example/generate-in-all-providers
version: 1.0.0
name: Generate in all providers
description: Fan out the same image or video prompt across every connected provider and present one version per provider for the user to pick.
publisher: blooper

applies_to:
  folder_kind: ["image", "video", "moodboard"]

tools:
  - list_available_image_providers
  - list_available_video_providers
  - generate_image
  - generate_video
  - write_file_version
  - request_user_pick

params:
  - name: prompt_text
    label: Prompt
    type: text
    placeholder: "A neon-lit alley in the rain, low angle, anamorphic"
    max_length: 2000
  - name: mode
    label: Output kind
    type: select
    options:
      - image
      - video
    default: image
  - name: aspect
    label: Aspect ratio
    type: select
    options:
      - "16:9"
      - "9:16"
      - "1:1"
      - "4:3"
    default: "16:9"
  - name: duration_seconds
    label: Duration (video only, seconds)
    type: integer
    optional: true
    min: 2
    max: 12
    default: 5
  - name: seed
    label: Seed (optional, shared across providers)
    type: integer
    optional: true
    min: 0

output:
  produces: file_versions
  count: dynamic
  parent_kind: folder
  parent_from: context.current_folder

permissions:
  install: any_project_member
  run: any_project_member

budget:
  max_provider_calls: 12
  max_minutes: 15

prompt: |
  You are a creative director comparing providers head-to-head.

  1. Call list_available_image_providers (if mode == "image") or
     list_available_video_providers (if mode == "video"). If fewer than two
     providers are connected, tell the user and stop.
  2. For each provider, submit the same prompt with the same aspect, the same
     seed (if provided), and (for video) the same duration. Pass the provider
     id along.
  3. Wait for every job. If a provider fails, record the error and continue;
     do not retry inside this skill.
  4. Save each successful result as a file version in the current folder,
     named "compare_<provider_id>", with metadata {provider, prompt, seed,
     duration_seconds}.
  5. Call request_user_pick with the list of saved file versions and the label
     "Pick your favorite". The user's choice becomes the canonical version
     (others stay as alternates).
  6. Return a one-line summary: which providers succeeded, which failed, and
     which file version the user picked.
