slug: community-example/regenerate-shot
version: 1.0.0
name: Regenerate shot
description: Make a new version of a single shot with a tweak (style, camera, prompt edit) while keeping the rest of the storyboard locked.
publisher: blooper

applies_to:
  file_type: ["image", "video"]
  parent_folder_name: ["shots", "storyboard"]

tools:
  - read_file_version
  - generate_image
  - generate_video
  - write_file_version

params:
  - name: source_shot
    label: Shot to regenerate
    type: file_version
    source: current_folder
  - name: tweak
    label: What to change
    type: text
    placeholder: "wider lens, push the camera lower, keep everything else"
    max_length: 1000
  - name: keep_seed
    label: Keep the same seed
    type: boolean
    default: true
  - name: strength
    label: Tweak strength (0.0 = same, 1.0 = full reroll)
    type: number
    min: 0
    max: 1
    default: 0.45
  - name: variants
    label: Number of variants to produce
    type: integer
    min: 1
    max: 4
    default: 1

output:
  produces: file_versions
  count: from_param.variants
  parent_kind: file
  parent_from: context.current_file

permissions:
  install: any_project_member
  run: any_project_member

budget:
  max_provider_calls: 6
  max_minutes: 8

prompt: |
  You are refining a single shot in a locked storyboard.

  1. Load the source file version (param: source_shot) and read its metadata:
     provider, original prompt, seed, aspect, duration_seconds (for video).
  2. Compose a revised prompt that applies the user's `tweak` text on top of the
     original prompt. Do not invent additional changes; preserve subject,
     setting, characters, and continuity unless the tweak explicitly asks
     otherwise.
  3. If `keep_seed` is true and the provider supports it, reuse the original
     seed. Otherwise let the provider pick.
  4. Submit `variants` jobs to the same provider that produced the source, with
     the requested `strength`. For video, reuse the original duration.
  5. Save each result as a new file version under the same parent shot, named
     `<original_name>_v<next_index>`, carrying forward metadata {provider,
     prompt, seed, aspect, tweak, strength, parent_version_id}.
  6. Return a short summary: provider used, seed (kept or new), variants
     produced, and any provider warnings.
